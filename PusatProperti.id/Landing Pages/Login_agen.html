<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pusatproperti.id</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="model.css">
</head>

<body>

    <div class="login-card">
        <h1 class="title">Masuk Ke Akun</h1>

        <div class="logo-container">
            <img src="logo.png" alt="Pusatproperti.id">
        </div>

        <div class="tab-menu">
            <a href="login_member.html" class="tab-item inactive">Member Umum</a>
            <a href="login_agen.html" class="tab-item active">Agen Pusatproperti.id</a>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='HomePage.html';">
            <div class="input-group">
                <label>Email/Username</label>
                <div class="inner-input">
                    <i class="fa-regular fa-user icon-field"></i>
                    <input type="text" name="user" placeholder="Masukan email/username" required>
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="inner-input">
                    <i class="fas fa-lock icon-field"></i>
                    <input type="password" name="pass" placeholder="Masukan password" required>
                    <i class="fa-regular fa-eye eye-icon"></i>
                </div>
            </div>

            <div class="extra-row">
                <div class="remember-me">
                    <input type="checkbox" id="keep-login">
                    <label for="keep-login">Biarkan saya tetap masuk</label>
                </div>
                <a href="#">Lupa Kata Sandi?</a>
            </div>

            <button type="submit" class="btn-login">Masuk</button>
        </form>

        <div class="social-section">
            <p class="divider">Atau daftar dengan</p>

            <button type="button" class="btn-social btn-google">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                <span>Daftar dengan Google</span>
            </button>

            <button type="button" class="btn-social btn-apple">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
                <span>Daftar dengan Apple</span>
            </button>

            <br><p class="divider-text">
                Belum punya akun? <a href="Register_agen.html" style="color: #6366f1; text-decoration: none; font-weight: 500;">Daftar di sini</a>
            </p>
        </div>
    </div>

</body>

</html>
