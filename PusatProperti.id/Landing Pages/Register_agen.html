<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Agen - Pusatproperti.id</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="Gaya.css">
</head>

<body>

    <div class="login-card">
        <h1 class="title">Daftar Akun Agen</h1>

        <div class="logo-container">
            <img src="logo.png" alt="Pusatproperti.id">
        </div>

        <div class="tab-menu">
            <a href="register_member.html" class="tab-item inactive">Member Umum</a>
            <a href="register_agen.html" class="tab-item active">Agen Pusatproperti.id</a>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='HomePage.html';">
            <div class="input-group">
                <label>Nama Lengkap Agen</label>
                <div class="inner-input">
                    <i class="fa-regular fa-id-badge icon-field"></i>
                    <input type="text" name="nama_agen" placeholder="Nama sesuai KTP" required>
                </div>
            </div>

            <div class="input-group">
                <label>Nomor WhatsApp</label>
                <div class="inner-input">
                    <i class="fa-brands fa-whatsapp icon-field"></i>
                    <input type="tel" name="whatsapp" placeholder="Contoh: 08123456789" required>
                </div>
            </div>

            <div class="input-group">
                <label>Nama Kantor / Agency (Opsional)</label>
                <div class="inner-input">
                    <i class="fa-solid fa-building icon-field"></i>
                    <input type="text" name="agency" placeholder="Nama perusahaan properti">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="inner-input">
                    <i class="fas fa-lock icon-field"></i>
                    <input type="password" name="pass" placeholder="Buat password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">Daftar Sebagai Agen</button>
        </form>

        <div class="social-section">
            <p class="divider">Atau daftar dengan</p>

            <button type="button" class="btn-social btn-google">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                <span>Daftar dengan Google</span>
            </button>

            <button type="button" class="btn-social btn-apple">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
                <span>Daftar dengan Apple</span>
            </button>

            <br><p class="divider-text">
                Sudah bergabung? <a href="login_agen.html" style="color: #6366f1; text-decoration: none; font-weight: 500;">Login Agen</a>
            </p>
        </div>
    </div>

</body>

</html>
